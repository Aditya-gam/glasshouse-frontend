name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token (infra-devops rule); raise per-job only when needed.
permissions:
  contents: read

# Cancel superseded CI runs on the same ref (deploy jobs must NOT cancel-in-progress).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Typecheck · Lint · Format · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Drift-guard: regenerate the client from the vendored spec; fail if it differs from
      # what's committed (catches a stale client or an un-regenerated spec bump).
      - name: API client drift-guard
        run: pnpm api:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test:run
      - run: pnpm build

  semgrep:
    name: Semgrep (SAST / secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - run: semgrep scan --config p/default --config p/secrets --error --metrics off

  sonarcloud:
    name: SonarCloud (quality + coverage)
    runs-on: ubuntu-latest
    # Skips cleanly until SONAR_TOKEN is set; then runs as a real gate
    # (sonar.qualitygate.wait=true makes the scan fail on the Quality Gate).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history — Sonar needs it for new-code / blame
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "::notice::SONAR_TOKEN not set — skipping SonarCloud. Add the repo secret to enable the gate."
      - if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm install --frozen-lockfile
      - name: Tests + coverage (lcov)
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm test:coverage
      # The pin below is v8.2.0 — a PUBLIC commit SHA, not a secret. Semgrep's secrets
      # heuristic mis-flags the 40-hex next to "sonarqube", so suppress that one rule inline.
      - name: SonarQube Cloud scan + Quality Gate
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
