name: E2E

# Playwright critical-path journeys + a real-browser WCAG-AA sweep. Runs against a local dev
# server. Skips cleanly until the Clerk runtime keys are set (the dev server renders
# ClerkProvider). Per the testing spec, E2E is a top-of-pyramid gate on main + nightly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * *" # nightly

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  # The Clerk PUBLISHABLE key is public (a NEXT_PUBLIC_* value, pk_test_…), not a secret. It sits at
  # workflow scope so the skip-gate `if:` below can read it (the `secrets` context isn't available in
  # `if:` — this env indirection is the standard workaround). The real secret, CLERK_SECRET_KEY, is
  # scoped to only the step that needs it (below), never exposed to the whole job.
  # nosemgrep: yaml.github-actions.security.gha-workflow-env-secret.gha-workflow-env-secret
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

jobs:
  e2e:
    name: Playwright E2E + a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # Install always (cheap, and populates the pnpm cache); only the browser + run are gated.
      - run: pnpm install --frozen-lockfile
      - if: ${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY == '' }}
        run: echo "::notice::Clerk keys not set — skipping E2E. Add NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY + CLERK_SECRET_KEY repo secrets to enable."
      - name: Install Playwright Chromium
        if: ${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright (E2E + a11y)
        if: ${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' }}
        env:
          # Server-only secret, scoped to just this step (the dev server needs it at runtime).
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: pnpm test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
