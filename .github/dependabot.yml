# Dependabot — version + security updates (OWASP A03 supply-chain).
# Grouped minor/patch updates keep PR noise low; majors arrive as individual PRs
# (they need human attention). github-actions are SHA-pinned in our workflows —
# Dependabot bumps the SHA + version comment together, keeping the pins fresh.
# Note: Dependabot is weak on pnpm *transitive* deps; the `pnpm audit` CI job and
# pnpm overrides cover that gap.
version: 2
updates:
  - package-ecosystem: npm # also handles pnpm (reads pnpm-lock.yaml)
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    ignore:
      # @types/node must track the *runtime* Node major (Node 20 on Vercel), not race ahead of
      # it — @types/node 26 would type against Node 26 APIs the deployed runtime doesn't have.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      production-dependencies:
        applies-to: version-updates
        dependency-type: production
        update-types: [minor, patch]
      development-dependencies:
        applies-to: version-updates
        dependency-type: development
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"
    labels:
      - ci
      - dependencies
