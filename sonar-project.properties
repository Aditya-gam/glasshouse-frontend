# SonarCloud (SonarQube Cloud) config — read by SonarSource/sonarqube-scan-action.
# CONFIRM organization + projectKey match the SonarCloud project page before the first run.
sonar.organization=aditya-gam
sonar.projectKey=Aditya-gam_glasshouse-frontend

# Hand-written app code. Tests are colocated, so flag them as tests (not main source).
sonar.sources=app,components,lib
sonar.tests=app,components,lib
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclude generated + config + infra code from analysis (the @hey-api client, configs, build output).
sonar.exclusions=lib/api/**,lib/mocks/**,**/*.config.*,.next/**,e2e/**,openapi/**

# Coverage exclusions — code that is NOT unit-testable with Vitest (async Server Components,
# route handlers, server-only modules) is covered by Playwright E2E, not here; vendored shadcn
# primitives and test/fixture infra aren't unit-tested either. Keeps new_coverage meaningful.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,test/**,lib/fixtures/**,lib/mocks/**,**/page.tsx,**/layout.tsx,app/api/**,lib/dal/**,lib/data/**,instrumentation.ts,proxy.ts,components/ui/**

# Coverage from Vitest (`pnpm test:coverage` → coverage/lcov.info).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Block the CI job on the Quality Gate (the scan waits for the gate result and fails on it).
sonar.qualitygate.wait=true
